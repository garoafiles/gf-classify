when:
  - event: [push, pull_request]

steps:
  test:
    image: golang:1.25
    commands:
      - go build ./...
      - go vet ./...
      - go test -race -count=1 ./...

  release:
    image: node:22-alpine
    when:
      - event: push
        branch: main
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - apk add --no-cache git
      - git config --global user.name "Garoa Files"
      - git config --global user.email "garoafiles@garoafiles.com"
      # semantic-release uses the clean repositoryUrl from .releaserc.json for
      # its push (ignores any `origin` remote overrides), so we authenticate at
      # the git-protocol layer via a throwaway .netrc.
      - printf "machine codeberg.org\nlogin garoafiles\npassword %s\n" "$${GITEA_TOKEN}" > ~/.netrc
      - chmod 600 ~/.netrc
      - npx --yes
          -p semantic-release
          -p @semantic-release/commit-analyzer
          -p @semantic-release/release-notes-generator
          -p @semantic-release/changelog
          -p @semantic-release/git
          semantic-release
    depends_on: [test]
